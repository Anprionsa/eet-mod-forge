<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EET Mod Forge</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Fira+Code:wght@400;500&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e14;--bg2:#141620;--bg3:#1a1e2e;--bgs:#10121a;--gold:#d4a843;--goldd:#8b7030;--goldb:#f0d060;--tx:#c8ccd8;--txd:#6b7084;--txb:#e8ecf4;--grn:#4ade80;--red:#f87171;--blu:#60a5fa;--pur:#a78bfa;--brd:#1e2234;--brd2:#2a3050;--org:#fb923c;--bg-bd1:#1e3a2f;--bg-bd2:#1e2a3a;--bg-bd3:#2a1e3a;--bg-bd4:#3a1e1e;--bg-warn:#2a2010;--brd-warn:#4a3820;--tx-warn:#f0c050;--bg-err:#2a1010;--brd-err:#4a2020;--bg-info:#10202a;--brd-info:#204a60;--bg-alert:#1a1410;--brd-alert:#3a2820}
html,body{height:100%}html{background:var(--bg);color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:14px;letter-spacing:.01em}body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--goldd);border-radius:3px}
a{color:var(--blu);text-decoration:none}a:hover{text-decoration:underline}
.ci{font-family:'Cinzel',serif}.fi{font-family:'Fira Code',monospace;font-size:.82em}
.bd{display:inline-block;padding:1px 7px;border-radius:3px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.bd1{background:var(--bg-bd1);color:var(--grn)}.bd2{background:var(--bg-bd2);color:var(--blu)}.bd3{background:var(--bg-bd3);color:var(--pur)}.bd4{background:var(--bg-bd4);color:var(--red)}
.bdo{background:#2a1a1a;color:var(--red);border:1px solid #4a2a2a}.bd-win{background:rgba(251,146,60,.12);color:var(--org);border:1px solid rgba(251,146,60,.3)}
.gw{text-shadow:0 0 20px rgba(212,168,67,.3)}
.tb{background:linear-gradient(180deg,#12141e,var(--bg));border-bottom:1px solid var(--brd);padding:10px 20px;position:sticky;top:0;z-index:50}
.sb{width:260px;min-width:260px;background:var(--bgs);border-right:1px solid var(--brd);overflow-y:auto;position:sticky;top:52px;height:calc(100vh - 52px);transition:left .25s}
.si{padding:7px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .15s;font-size:.83rem}
.si:hover{background:var(--bg3)}.si.ac{background:var(--bg3);border-left:3px solid var(--gold);color:var(--gold)}.si .ct{color:var(--txd);font-size:.75rem}
.sh{padding:8px 12px;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--goldd);font-weight:700}
.mc{background:var(--bg2);border:1px solid var(--brd);border-radius:8px;margin-bottom:4px;transition:all .15s}
.mc:hover{border-color:var(--brd2);box-shadow:0 1px 6px rgba(212,168,67,.06)}.mc.sel{border-left:3px solid var(--gold)}.mc.cfl{border-color:#4a2020}
.mh{padding:9px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.mx{padding:0 14px 10px 32px;border-top:1px solid var(--brd)}
.cr{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid var(--brd);transition:background .15s}
.cr:last-child{border-bottom:none}.cr.xo{opacity:.5}.cr.ck-on{background:rgba(212,168,67,.08);border-radius:4px}
.ck{appearance:none;-webkit-appearance:none;width:16px;height:16px;min-width:16px;border:1.5px solid var(--brd2);border-radius:3px;cursor:pointer;position:relative;top:2px;transition:all .15s}
.ck:checked{background:var(--gold);border-color:var(--gold)}.ck:checked::after{content:'\2713';position:absolute;top:-2px;left:2px;font-size:12px;color:var(--bg);font-weight:bold}
.sx{background:var(--bg2);border:1px solid var(--brd);color:var(--txb);padding:7px 12px;border-radius:6px;width:100%;font-size:.88rem;outline:none;font-family:inherit}.sx:focus{border-color:var(--goldd)}
.bt{padding:5px 14px;border-radius:5px;border:1px solid var(--brd2);background:var(--bg2);color:var(--tx);cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .15s}
.bt:hover{background:var(--bg3);border-color:var(--goldd)}.bg{background:linear-gradient(135deg,var(--goldd),var(--gold));color:var(--bg);border:none;font-weight:700}.bg:hover{background:linear-gradient(135deg,var(--gold),var(--goldb))}
.bs{padding:3px 10px;font-size:.76rem}
.st{text-align:center}.sn{font-size:1.4rem;font-weight:700;color:var(--gold);line-height:1}.sl{font-size:.66rem;color:var(--txd);text-transform:uppercase;letter-spacing:.08em}
.ar{transition:transform .2s;color:var(--txd);font-size:.8rem}.ar.op{transform:rotate(90deg)}
.nt{font-size:.76rem;color:var(--txd);line-height:1.4;white-space:pre-wrap;max-height:100px;overflow-y:auto;padding:3px 0}
.bb{position:sticky;bottom:0;background:var(--bgs);border-top:1px solid var(--brd);padding:8px 20px;display:flex;align-items:center;justify-content:space-between;z-index:50;gap:8px;flex-wrap:wrap}
.pl{padding:3px 10px;border-radius:12px;font-size:.72rem;cursor:pointer;border:1px solid var(--brd);color:var(--txd);transition:all .15s}
.pl:hover{border-color:var(--goldd);color:var(--tx)}.pl.ac{background:var(--goldd);color:var(--bg);border-color:var(--gold)}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}.fin{animation:fi .15s ease-out}
@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}
.md{background:var(--bg2);border:1px solid var(--brd2);border-radius:8px;padding:20px;max-width:760px;width:95%;max-height:85vh;overflow-y:auto}
.warn{background:var(--bg-warn);border:1px solid var(--brd-warn);border-radius:4px;padding:6px 12px;margin:3px 0;font-size:.78rem;color:var(--tx-warn)}
.err{background:var(--bg-err);border:1px solid var(--brd-err);color:var(--red)}.info{background:var(--bg-info);border:1px solid var(--brd-info);color:var(--blu)}
.sec-hdr{padding:6px 14px;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;color:var(--goldd);font-weight:700;font-family:'Cinzel',serif;background:linear-gradient(90deg,rgba(212,168,67,.08),transparent);border-left:3px solid var(--goldd);display:flex;align-items:center;gap:8px;height:50px;box-sizing:border-box}
.sec-hdr .sec-sub{font-family:'Source Sans 3',sans-serif;font-size:.62rem;color:var(--txd);letter-spacing:.04em;font-weight:400;text-transform:none}
.split-bd{background:rgba(167,139,250,.12);color:var(--pur);border:1px solid rgba(167,139,250,.3);cursor:pointer}
.split-bd:hover{background:rgba(167,139,250,.2)}
.v-comment{font-size:.68rem;color:var(--txd);font-style:italic;opacity:.8}
.drop-zone{border:2px dashed var(--brd2);border-radius:8px;padding:12px;text-align:center;transition:all .2s;cursor:pointer}
.drop-zone:hover{border-color:var(--gold);background:rgba(212,168,67,.05)}
.preset-card{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:10px 12px;cursor:pointer;transition:all .15s}
.preset-card:hover{border-color:var(--gold);background:var(--bg3)}
.diff-add{color:var(--grn)}.diff-rem{color:var(--red)}
.tab{padding:7px 14px;cursor:pointer;font-size:.82rem;color:var(--txd);border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--tx)}.tab.ac{color:var(--gold);border-bottom-color:var(--gold)}
.diag-card{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:10px 14px;margin-bottom:6px}
.diag-crit{border-left:3px solid var(--red)}.diag-warn{border-left:3px solid var(--org)}.diag-info{border-left:3px solid var(--blu)}.diag-ok{border-left:3px solid var(--grn)}
.ver-badge{font-size:.68rem;padding:1px 6px;border-radius:3px;font-weight:600}
.ver-ok{background:#1a2e1a;color:var(--grn)}.ver-up{background:#2a2010;color:var(--org)}
.gh-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--brd);background:var(--bg2);color:var(--txd);cursor:pointer;font-size:.75rem;transition:all .15s}
.gh-btn:hover{border-color:var(--gold);color:var(--tx)}.gh-btn:disabled{opacity:.4;cursor:not-allowed}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.loading-ring{width:40px;height:40px;border:3px solid var(--brd);border-top-color:var(--gold);border-radius:50%}
.detail{width:340px;min-width:340px;background:var(--bgs);border-left:1px solid var(--brd);overflow-y:auto;padding:14px;position:sticky;top:52px;height:calc(100vh - 52px)}
.detail-section{margin-bottom:12px}
.detail-section h4{font-size:.78rem;color:var(--goldd);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.timeline{padding:14px;overflow-y:auto;flex:1}
.tl-cat{margin-bottom:10px}
.tl-cat-head{font-size:.82rem;font-weight:600;color:var(--gold);padding:4px 0;border-bottom:1px solid var(--brd);margin-bottom:4px}
.tl-mod{display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:.72rem;cursor:pointer;border:1px solid var(--brd);transition:all .15s}
.tl-mod:hover{border-color:var(--gold)}.tl-mod.tl-sel{background:var(--goldd);color:var(--bg);border-color:var(--gold)}
.tag-row{display:flex;gap:3px;flex-wrap:wrap;padding:3px 12px}
.tag{padding:2px 8px;border-radius:10px;font-size:.68rem;cursor:pointer;border:1px solid var(--brd);color:var(--txd);transition:all .15s}
.tag:hover{border-color:var(--goldd)}.tag.ac{background:var(--pur);color:#fff;border-color:var(--pur)}
/* Phase 1D + 2: New styles */
.alert-bar{background:#1a1410;border:1px solid #3a2820;border-radius:6px;padding:7px 12px;margin:3px 8px;display:flex;align-items:center;gap:8px;font-size:.8rem;animation:fi .15s ease-out}
.alert-conflict{border-color:#4a2020;background:#1e0e0e;color:var(--red)}
.alert-dep{border-color:#204a20;background:#0e1e0e;color:var(--grn)}
.essential-badge{background:linear-gradient(135deg,#2a3a1a,#1a2a10);border:1px solid #4a6a2a;color:#a0d060;font-size:.6rem;padding:1px 6px;border-radius:3px;font-weight:700;letter-spacing:.04em}
.updated-badge{background:#2a2a1a;border:1px solid #4a4a2a;color:var(--org);font-size:.6rem;padding:1px 5px;border-radius:3px;font-weight:600}
.stars-badge{color:var(--goldb);font-size:.68rem}
.conflict-dot{width:7px;height:7px;border-radius:50%;background:var(--red);display:inline-block;margin-right:3px;flex-shrink:0}
.dep-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);display:inline-block;margin-right:3px;flex-shrink:0}
/* Wizard */
.wiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center}
.wiz-card{background:var(--bg2);border:1px solid var(--gold);border-radius:12px;padding:28px;max-width:640px;width:95%;max-height:85vh;overflow-y:auto}
.wiz-dots{display:flex;gap:6px;margin-bottom:16px;justify-content:center}
.wiz-dot{width:10px;height:10px;border-radius:50%;background:var(--brd2);transition:all .2s}
.wiz-dot.ac{background:var(--gold)}
.wiz-opt{background:var(--bg);border:1px solid var(--brd);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all .15s;margin-bottom:6px}
.wiz-opt:hover{border-color:var(--gold);background:var(--bg3)}
.wiz-opt.chosen{border-color:var(--gold);background:rgba(212,168,67,.1)}
/* Mobile */
.menu-toggle{display:none;background:none;border:1px solid var(--brd);color:var(--gold);font-size:1.1rem;padding:2px 8px;border-radius:4px;cursor:pointer}
@media(max-width:900px){.sb{width:220px;min-width:220px}.detail{width:280px;min-width:280px}}
@media(max-width:700px){
  .menu-toggle{display:inline-block}
  .sb{position:fixed;left:-270px;z-index:60;height:100vh;top:0;width:260px}
  .sb.open{left:0}
  .detail{position:fixed;right:-340px;z-index:60;top:52px;height:calc(100vh - 52px)}
  .detail.open{right:0}
  .mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useRef,useEffect,memo,createContext,useContext}=React;

// ═══ Data Context ═══
const DC=createContext(null);const AC=createContext(null);

// ═══ localStorage ═══
const LS={
  _p:'emf_',
  get(k,d){try{const v=localStorage.getItem(this._p+k);return v?JSON.parse(v):d}catch(e){return d}},
  set(k,v){try{localStorage.setItem(this._p+k,JSON.stringify(v))}catch(e){}},
  del(k){try{localStorage.removeItem(this._p+k)}catch(e){}}
};

function DataLoader({children}){
  const[data,setData]=useState(null);const[err,setErr]=useState(null);const[prog,setProg]=useState('');
  useEffect(()=>{async function load(){try{
    const files=['mods','presets','compat','known_issues','github_mods','version_cache','recommendations','conflicts','tools'];
    const r={};for(const f of files){setProg('Loading '+f+'...');try{const resp=await fetch('./data/'+f+'.json',{cache:'no-cache'});if(resp.ok)r[f]=await resp.json();else r[f]=f==='version_cache'||f==='compat'||f==='conflicts'?{}:[]}catch(e){r[f]=f==='version_cache'||f==='compat'||f==='conflicts'?{}:[]}}
    setData(r)}catch(e){setErr(e.message)}}load()},[]);
  if(err)return(<div className="loading"><div className="ci" style={{color:'var(--red)',fontSize:'1.2rem'}}>Error</div><div style={{color:'var(--txd)'}}>{err}</div></div>);
  if(!data)return(<div className="loading"><div className="loading-ring spin"></div><div className="ci" style={{color:'var(--gold)',fontSize:'1.1rem'}}>EET Mod Forge</div><div style={{color:'var(--txd)',fontSize:'.85rem'}}>{prog}</div></div>);
  return <DC.Provider value={data}>{children}</DC.Provider>;
}

// ═══ Constants ═══
const CL={'PRE EET BGEE MODS':'Pre-EET (BG1)','EET STARTS HERE':'EET Core','ENGINE':'Engine','INTERFACE':'Interface / UI','GRAPHICAL AND SOUND OVERWRITE MODS':'Graphics & Sound','RESTORATIONS':'Restorations','QUEST MODS BG1':'Quests \u2014 BG1','QUEST MODS BG2':'Quests \u2014 BG2','QUEST MODS ToB':'Quests \u2014 ToB','NEW NPC MODS':'New NPCs','AFTER NEW NPCS':'NPC Expansions','CREATURE MODS':'Creature Mods','EXPERIENCE TWEAKS':'XP Tweaks','ITEM ADDITION MODS':'Items','SPELL MODS':'Spells','KIT MODS':'Kits & Classes','PRE-TACTICAL TWEAKS':'Pre-Tactical Tweaks','TACTICAL MODS':'Tactical','POST-TACTICAL TWEAKS':'Post-Tactical Tweaks','EET FINALIZATION':'EET Finalization','POST EET':'Post-EET'};
const CO=Object.keys(CL);const PST={BG1:'bd1',SoD:'bd2',SoA:'bd3',ToB:'bd4'};
const CONFIG={EET_MOD_ID:12,DUAL_INSTALL:['eefixpack'],ITEM_HEIGHT:50,VL_OVERFLOW:8};

// Category descriptions for tooltips
const CAT_DESC={'PRE EET BGEE MODS':'Mods installed on BG1:EE before the EET merge. Must go on your BG1 game folder first.','EET STARTS HERE':'The EET core mod that merges BG1 into BG2. Everything after this installs on the merged game.','ENGINE':'Engine-level modifications (EEex). These extend what other mods can do.','INTERFACE':'UI overhauls and tweaks. Only pick ONE major UI overhaul.','GRAPHICAL AND SOUND OVERWRITE MODS':'Visual and audio replacements. Higher quality textures, portraits, sounds.','RESTORATIONS':'Content cut from the original games, restored by modders.','QUEST MODS BG1':'New quests and content for the Baldur\'s Gate 1 portion.','QUEST MODS BG2':'New quests and content for Shadows of Amn.','QUEST MODS ToB':'New quests and content for Throne of Bhaal.','NEW NPC MODS':'New companion characters with their own stories and dialogue.','AFTER NEW NPCS':'Mods that expand existing or new NPCs. Install after NPC mods.','CREATURE MODS':'Changes to enemy creatures and encounters. Install before tactical mods.','EXPERIENCE TWEAKS':'XP gain adjustments and level scaling modifications.','ITEM ADDITION MODS':'New items, weapons, armor, and equipment.','SPELL MODS':'New spells, spell changes, and magic system modifications.','KIT MODS':'New character kits, classes, and class modifications.','PRE-TACTICAL TWEAKS':'General tweaks that should be installed before SCS and other tactical mods. Proficiency changes, item tweaks, PnP fixes.','TACTICAL MODS':'Sword Coast Stratagems, Tactics Remix, The Crucible, and other AI/encounter overhauls. The tactical challenge layer.','POST-TACTICAL TWEAKS':'Final tweaks, portraits, voice packs, scripts, and patches. Install after tactical mods but before EET End.','EET FINALIZATION':'EET End \u2014 the final step. Must be installed after ALL other mods to finalize the EET merge.','POST EET':'Mods installed after EET_End. GUI replacements, engine-level scripts, biffing, and other tools that must come last.'};

// ═══ Utilities ═══
function buildIdx(D,compat){
  const CI={};Object.entries(compat||{}).forEach(([k,v])=>{CI[k]=v});
  const WI={};const WF={};
  D.forEach(mod=>{mod.co.forEach((c,ci)=>{const f=(c.wf||'').toLowerCase();const cn=c.wc!=null?c.wc:(c.cn!=null?c.cn:0);if(f){const k=f+":"+cn;if(!WI[k])WI[k]=[];WI[k].push({mi:mod.i,ci});if(!WF[f])WF[f]=[];WF[f].push({mi:mod.i,ci,comp:cn})}})});
  return{CI,WI,WF};
}
function getC(CI,n){const l=n.toLowerCase();if(CI[l])return CI[l];for(const[k,v]of Object.entries(CI))if(l.includes(k)||k.includes(l))return v;return null}
function genW(mod,comp){const f=comp.wf||mod.t.toUpperCase();const p=(comp.wp||f+"\\"+f+".TP2").replace(/\//g,"\\");const cn=comp.wc!=null?comp.wc:(comp.cn!=null?comp.cn:0);return"~"+p+"~ #0 #"+cn+" // "+(comp.n||mod.n)}
function genP(mod,comp){if(comp.pi)return comp.pi+";"+(comp.n||mod.n);const cn=comp.cn!=null?":"+comp.cn:(comp.wc!=null?":"+comp.wc:"");return mod.t+cn+";"+(comp.n||mod.n)}
function parseLog(text){const e=[];const re=/~([^\\\/]+)[\\\/]([^~]+)~\s+#(\d+)\s+#(\d+)/;text.split("\n").forEach(l=>{const m=re.exec(l.trim());if(m)e.push({folder:m[1].toLowerCase(),comp:parseInt(m[4])})});return e}
function validate(D,sel){const m=[];const s=new Set();D.forEach(mod=>{mod.co.forEach((c,ci)=>{if(sel[mod.i+"-"+ci])s.add(mod.t.toLowerCase())})});
  if(!s.has('eefixpack'))m.push({t:'err',m:'EE Fixpack not selected'});if(!s.has('eet'))m.push({t:'err',m:'EET Core not selected'});
  if(!s.has('eet_end')&&!s.has('eet_tweaks'))m.push({t:'warn',m:'EET_end not selected'});
  m.push({t:'info',m:'mod_installer: eet --bg1-log-file WeiDU-BGEE.log --bg2-log-file WeiDU.log'});return m}

function parseDebug(text,KI){
  const lines=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n").split("\n");
  const r={ver:null,installed:[],errors:[],warnings:[],success:[],pathIssues:[],matched:[],unknown:[]};
  const EP=[[/ERROR:\s*\[(.+?)\]\s*->\s*\[(.+?)\]\s*Patching Failed/,'critical','patch_failed'],[/ERROR Installing \[(.+?)\], rolling back/,'critical','rollback'],[/FATAL ERROR:\s*Failure\("(.+?)"\)/,'fatal','fatal'],[/PARSE ERROR at line (\d+)/,'critical','parse_error'],[/Stopping installation/,'critical','stopped'],[/DELETE_BYTES out of bounds/,'critical','delete_bounds'],[/ERROR:\s*processing \.D/,'critical','dialog_error'],[/NOT_INSTALLED/,'error','not_installed']];
  const WP=[[/(.+?) file not found\. Skipping/,'warning','file_missing'],[/WARNING:\s*internal label/,'warning','dialog_label']];
  lines.forEach((line,i)=>{line=line.trim();if(!line)return;
    if(line.startsWith('WeiDU v')){const m=line.match(/WeiDU v\s*(\d+)/);if(m)r.ver=parseInt(m[1])}
    const im=line.match(/^([A-Z0-9_\/\\-]+\.TP2)\s+(\d+)\s+(\d+)\s+(\w+)/i);
    if(im){r.installed.push({tp2:im[1],comp:parseInt(im[3]),status:im[4]});if(im[4]==='NOT_INSTALLED')r.errors.push({ln:i+1,sev:'error',cat:'not_installed',msg:line.substring(0,200)});return}
    if(/SUCCESSFULLY INSTALLED\s+(.+)/.test(line)){r.success.push(line.match(/SUCCESSFULLY INSTALLED\s+(.+)/)[1]);return}
    const pi=line.match(/^([A-Z0-9_-]+)\/([^\s]+\.TP2)/i);if(pi)r.pathIssues.push(pi[0]);
    for(const[re,sev,cat]of EP){if(re.test(line)){r.errors.push({ln:i+1,sev,cat,msg:line.substring(0,250)});return}}
    for(const[re,sev,cat]of WP){if(re.test(line)){r.warnings.push({ln:i+1,sev,cat,msg:line.substring(0,250)});return}}
  });
  [...r.errors,...r.warnings].forEach(iss=>{let f=false;for(const ki of(KI||[])){try{if(new RegExp(ki.pattern,'i').test(iss.msg)){r.matched.push({issue:iss,known:ki});f=true;break}}catch(e){}}if(!f&&iss.sev!=='info')r.unknown.push(iss)});
  if(r.ver&&r.ver>=24700&&r.ver<=24900)r.warnings.push({ln:0,sev:'warning',cat:'weidu_ver',msg:'WeiDU '+r.ver+' codepage bug'});
  return r;
}

function encodeSelection(sel){const keys=Object.keys(sel).filter(k=>sel[k]).sort();return btoa(keys.join(','))}
function decodeSelection(hash){try{const s=atob(hash);const sel={};s.split(',').forEach(k=>{if(k)sel[k]=true});return sel}catch(e){return null}}

function genReport(D,sel,diff){
  const lines=['# EET Mod Forge \u2014 Install Report','','Generated: '+new Date().toISOString().substring(0,10),''];
  const selMods=[];D.forEach(mod=>{const comps=[];mod.co.forEach((c,ci)=>{if(sel[mod.i+"-"+ci])comps.push(c)});if(comps.length)selMods.push({mod,comps})});
  lines.push('## Summary','',`- **${selMods.length}** mods, **${selMods.reduce((a,m)=>a+m.comps.length,0)}** components selected`);
  if(diff.add||diff.rem)lines.push(`- **+${diff.add}** added, **-${diff.rem}** removed from baseline`);
  lines.push('','## Selected Mods','');
  let lastCat='';
  selMods.forEach(({mod,comps})=>{
    if(mod.c!==lastCat){lines.push('','### '+( CL[mod.c]||mod.c),'');lastCat=mod.c}
    lines.push('**'+mod.n+'**'+(mod.pl==='win'?' `[WIN ONLY]`':'')+(mod.u?' ([link]('+mod.u+'))':''));
    comps.forEach(c=>{lines.push('- '+(c.cn!=null?'#'+c.cn+' ':'')+c.n+(c.pl==='win'?' `[WIN ONLY]`':''))});
  });
  lines.push('','---','*Generated by [EET Mod Forge](https://github.com/Anprionsa/eet-mod-forge)*');
  return lines.join('\n');
}

function genBugReport(debugResult,modName){
  const lines=['## Bug Report'+(modName?' \u2014 '+modName:''),'','**WeiDU Version:** '+(debugResult.ver||'Unknown'),'','### Errors',''];
  debugResult.errors.forEach(e=>{lines.push('- `'+e.msg.substring(0,150)+'`')});
  if(!debugResult.errors.length)lines.push('No errors detected.');
  lines.push('','### Warnings','');
  debugResult.warnings.forEach(w=>{lines.push('- `'+w.msg.substring(0,150)+'`')});
  if(!debugResult.warnings.length)lines.push('No warnings.');
  lines.push('','### Installed Mods','','<details><summary>WeiDU.log ('+debugResult.installed.length+' entries)</summary>','','```');
  debugResult.installed.slice(0,50).forEach(e=>{lines.push(e.tp2+' '+e.comp+' '+e.status)});
  if(debugResult.installed.length>50)lines.push('... and '+(debugResult.installed.length-50)+' more');
  lines.push('```','','</details>');
  return lines.join('\n');
}

function fuzzyMatch(query,text){if(!query)return true;const q=query.toLowerCase();const t=text.toLowerCase();if(t.includes(q))return true;
  let qi=0;for(let ti=0;ti<t.length&&qi<q.length;ti++){if(t[ti]===q[qi])qi++}return qi===q.length&&q.length>=3}

// ═══ Conflict Index Builder ═══
function buildConflictIdx(conflicts,D){
  const tp2Id={};const nameId={};
  D.forEach(m=>{tp2Id[m.t.toLowerCase()]=m.i;nameId[m.n.toLowerCase()]=m.i});
  const byMod={};
  (conflicts.conflicts||[]).forEach(c=>{
    const aId=tp2Id[c.a.toLowerCase()]??nameId[(c.a||'').toLowerCase()];
    const bId=tp2Id[c.b.toLowerCase()]??nameId[(c.b||'').toLowerCase()];
    if(aId==null||bId==null)return;
    if(!byMod[aId])byMod[aId]=[];if(!byMod[bId])byMod[bId]=[];
    byMod[aId].push({severity:c.severity,reason:c.reason,comp_a:c.comp_a,comp_b:c.comp_b,other:bId});
    byMod[bId].push({severity:c.severity,reason:c.reason,comp_a:c.comp_b,comp_b:c.comp_a,other:aId});
  });
  const deps={};
  (conflicts.dependencies||[]).forEach(dep=>{
    const modId=tp2Id[(dep.mod||'').toLowerCase()]??nameId[(dep.mod||'').toLowerCase()];
    const targetId=tp2Id[(dep.requires||'').toLowerCase()]??nameId[(dep.requires||'').toLowerCase()];
    if(modId==null||targetId==null)return;
    if(!deps[modId])deps[modId]=[];
    deps[modId].push({targetId,type:dep.type,reason:dep.reason});
  });
  const essentials=new Set((conflicts.essentials||[]).map(e=>e.id));
  const metaC=conflicts.metaComponents||{};
  return{byMod,deps,essentials,essentialsList:conflicts.essentials||[],metaC};
}

const IH=50;const OV=8;
function VL({items,sel,onTog,onTogAll,onDetail,onNavSplit,externalRef}){
  const ref=useRef(null);const[st,setSt]=useState(0);const[ch,setCh]=useState(800);const[expId,setExpId]=useState(null);
  useEffect(()=>{if(ref.current)setCh(ref.current.clientHeight);const ro=new ResizeObserver(()=>{if(ref.current)setCh(ref.current.clientHeight)});if(ref.current)ro.observe(ref.current);return()=>ro.disconnect()},[]);
  useEffect(()=>{if(externalRef)externalRef.current=ref.current},[externalRef]);
  let si=Math.max(0,Math.floor(st/IH)-OV);let ei=Math.min(items.length,Math.ceil((st+ch)/IH)+OV);
  if(expId!=null){const xi=items.findIndex(it=>it.i===expId);if(xi>=0){si=Math.min(si,xi);ei=Math.max(ei,xi+1)}}
  return(<div ref={ref} style={{flex:1,overflow:'auto',padding:'8px 4px 8px 12px'}} onScroll={e=>setSt(e.target.scrollTop)}><div style={{height:items.length*IH,position:'relative'}}>{items.slice(si,ei).map((item,vi)=>{const idx=si+vi;return(<div key={item._sec?"s-"+item.c:item.i} style={{position:'absolute',top:idx*IH,left:0,right:0,height:IH,overflow:'visible'}}>{item._sec?<div className="sec-hdr"><span>{item.c}</span>{item.s&&<span className="sec-sub">{"\u203a "+item.s}</span>}</div>:<MC mod={item} sel={sel} onTog={onTog} onTogAll={onTogAll} onDetail={onDetail} onNavSplit={onNavSplit} expId={expId} onExpand={setExpId}/>}</div>)})}</div></div>);
}

      </div></div>)}

      {modal==='confirmClear'&&(<div className="mo" onClick={()=>setModal(null)}><div className="md" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
        <h2 className="ci" style={{color:'var(--red)',marginBottom:10,fontSize:'1rem'}}>Clear Selection?</h2>
        <div style={{fontSize:'.85rem',marginBottom:12}}>This will deselect all <b>{stats.c}</b> components across <b>{stats.m}</b> mods. This cannot be undone.</div>
        <div style={{display:'flex',justifyContent:'flex-end',gap:6}}>
          <button className="bt" onClick={()=>setModal(null)}>Cancel</button>
          <button className="bt" style={{background:'var(--red)',color:'#fff',borderColor:'var(--red)'}} onClick={()=>{initSel.current={};setSel({});setModal(null)}}>Clear All</button>
        </div>
      </div></div>)}
    </div>
    </AC.Provider>);
}

function App(){return <DataLoader><AppInner/></DataLoader>}
ReactDOM.render(<App/>,document.getElementById('root'));

</script>
</body>
</html>
